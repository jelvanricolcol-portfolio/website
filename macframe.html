<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mac Frame</title>

<style>
body {
    margin: 0;
    background: #0d0d0d;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

/* Frame */
.mac-frame {
    width: 1000px;
    height: 620px;
    border-radius: 14px;
    overflow: hidden;
    background: #000;
    box-shadow: 0 30px 80px rgba(0,0,0,0.7);
    display: flex;
    flex-direction: column;
}

/* Top bar */
.top-bar {
    height: 38px;
    background: #1c1c1e;
    display: flex;
    align-items: center;
    padding: 0 12px;
}

.controls {
    display: flex;
    gap: 8px;
}

.dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
}

.red { background: #ff5f57; }
.yellow { background: #ffbd2e; }
.green { background: #28c840; }

.title {
    flex: 1;
    text-align: center;
    color: #aaa;
    font-size: 13px;
}

/* Content Area */
.content {
    flex: 1;
    background: #111;
    position: relative;
}

/* Option 1: iframe embed */
.content iframe {
    width: 100%;
    height: 100%;
    border: none;
}

/* Option 2: direct HTML content */
.slot {
    width: 100%;
    height: 100%;
}
</style>
</head>

<body>

<div class="mac-frame">
    
    <div class="top-bar">
        <div class="controls">
            <div class="dot red"></div>
            <div class="dot yellow"></div>
            <div class="dot green"></div>
        </div>
        <div class="title">Preview</div>
    </div>

    <div class="content">
        
        <!-- 🔹 OPTION A: EMBED WEBSITE -->
        <!-- Replace URL -->
        <!-- <iframe src="https://portfolio.jelvan.pro"></iframe> -->

        <!-- 🔹 OPTION B: YOUR CUSTOM APP -->
        <div class="slot">
            <!-- Put ANY HTML here -->
            <div style="color:white; display:flex; justify-content:center; align-items:center; height:100%;">
                Your App / Demo Here
            </div>
        </div>

    </div>

</div>

</body>
</html>
